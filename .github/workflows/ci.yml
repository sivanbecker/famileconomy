name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Format + Lint + Typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Format check
        run: npx turbo format:check

      - name: Lint
        run: npx turbo lint

      - name: Typecheck
        run: npx turbo typecheck

  test:
    runs-on: ubuntu-latest
    name: Unit Tests
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npx turbo test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: '**/coverage/'
          retention-days: 7

  build:
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npx turbo build

  security:
    runs-on: ubuntu-latest
    name: Security Scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: 'fs'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

      - name: Snyk vulnerability scan
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

  db-migration-check:
    runs-on: ubuntu-latest
    name: Migration Lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for migration conflicts
        # Requires DATABASE_URL_TEST secret — skips gracefully when not set
        run: npx turbo db:migrate:check --filter=@famileconomy/api
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}

  e2e:
    runs-on: ubuntu-latest
    name: E2E Tests (web)
    # Only run on push to main to preserve CI minutes
    if: github.event_name == 'push'
    needs: [quality, test, build]
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_TEST }}
      NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET_TEST }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (web)
        run: npx turbo test:e2e --filter=web

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  deploy-staging:
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [quality, test, build, security]
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Deploy web to Vercel (preview)
        run: npx vercel deploy --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy API to Railway (staging)
        run: railway deploy --service=api-staging
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-production:
    runs-on: ubuntu-latest
    name: Deploy to Production
    needs: [deploy-staging, e2e]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      # Manual approval gate — configure in GitHub repo Settings → Environments
    steps:
      - uses: actions/checkout@v4
      - name: Deploy web to Vercel (production)
        run: npx vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
      - name: Deploy API to Railway (production)
        run: railway deploy --service=api-production
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}